version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: mathquiztador-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data:
